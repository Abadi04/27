<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | Whispr</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page auth-page">
  <div class="ambient ambient-strong" aria-hidden="true">
    <span class="blob blob-one"></span>
    <span class="blob blob-three"></span>
    <span class="particle p2"></span>
    <span class="particle p5"></span>
  </div>

  <main class="auth-shell">
    <a class="brand auth-brand" href="index.html">
      <span class="brand-mark">W</span>
      <span>Whispr</span>
    </a>
    <section class="glass-card auth-card">
      <h1>تسجيل الدخول</h1>
      <form class="stack-form" data-login-form>
        <label for="username">اسم المستخدم</label>
        <input id="username" name="username" type="text" placeholder="اكتب اسم المستخدم" autocomplete="username" required>

        <label for="password">كلمة المرور</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>

        <button class="btn btn-primary btn-full" type="submit">تسجيل الدخول</button>
      </form>
      <p class="form-note">مستخدم جديد؟ <a href="register.html">إنشاء حساب</a></p>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
