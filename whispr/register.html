<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب | Whispr</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page auth-page">
  <div class="ambient ambient-strong" aria-hidden="true">
    <span class="blob blob-one"></span>
    <span class="blob blob-two"></span>
    <span class="particle p1"></span>
    <span class="particle p4"></span>
  </div>

  <main class="auth-shell">
    <a class="brand auth-brand" href="index.html">
      <span class="brand-mark">W</span>
      <span>Whispr</span>
    </a>
    <section class="glass-card auth-card">
      <h1>إنشاء حساب جديد</h1>
      <form class="stack-form" data-register-form>
        <label for="name">الاسم</label>
        <input id="name" name="name" type="text" placeholder="اكتب اسمك" autocomplete="name" required>

        <label for="username">اسم المستخدم</label>
        <input id="username" name="username" type="text" placeholder="مثال: ahmad" autocomplete="username" required>

        <label for="password">كلمة المرور</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="new-password" required>

        <button class="btn btn-primary btn-full" type="submit">إنشاء حساب</button>
      </form>
      <p class="form-note">لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
