<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أرسل رسالة | Whispr</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page app-page send-page">
  <main class="send-shell">
    <a class="brand send-brand" href="index.html">
      <span class="brand-mark">W</span>
      <span>Whispr</span>
    </a>
    <section class="send-panel" data-send-panel>
      <span class="eyebrow">رسالة مجهولة</span>
      <h1>أرسل رسالة مجهولة إلى [أحمد]</h1>
      <form class="send-form" data-send-form>
        <label for="message">رسالتك</label>
        <textarea id="message" name="message" maxlength="300" placeholder="اكتب رسالتك هنا... لن يعرف أحد أنك أنت 👀" required></textarea>
        <div class="counter"><span data-char-count>0</span> / 300</div>
        <button class="btn btn-primary btn-full" type="submit">إرسال الرسالة</button>
      </form>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
