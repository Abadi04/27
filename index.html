<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <title>Veil | رسائل مجهولة للجوال</title>
    <meta name="description" content="Veil منصة رسائل مجهولة مصممة أولاً لمتصفح الجوال." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <header class="topbar">
      <a class="brand" href="/" data-link aria-label="Veil home">
        <span class="brand-mark">V</span>
        <span>Veil</span>
      </a>
      <nav class="top-actions">
        <button class="icon-button" id="languageToggle" type="button" aria-label="Toggle language">EN</button>
        <button class="icon-button" id="themeToggle" type="button" aria-label="Toggle color mode">
          <span class="sun">☼</span>
          <span class="moon">◐</span>
        </button>
        <a class="pill-link" href="/auth" data-link data-auth-link>دخول</a>
      </nav>
    </header>

    <main id="app" class="app-shell"></main>
    <nav id="mobileNav" class="mobile-nav" aria-label="Primary"></nav>
    <div id="toastHost" class="toast-host" aria-live="polite"></div>

    <script src="/app.js" defer></script>
  </body>
</html>
